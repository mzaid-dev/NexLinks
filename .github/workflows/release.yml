name: Build & Publish Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags (e.g., v1.0.0)

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      
      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Get Dependencies
        run: flutter pub get

      # --- ANDROID ---
      - name: Build Android APK
        run: flutter build apk --release
      
      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk NexLinks_Android.apk

      # --- LINUX ---
      - name: Build Linux
        run: flutter build linux --release

      - name: Compress Linux
        run: tar -czvf NexLinks_Linux.tar.gz -C build/linux/x64/release/bundle .

      # --- WEB ---
      - name: Build Web
        run: flutter build web --release

      - name: Compress Web
        run: tar -czvf NexLinks_Web.tar.gz -C build/web .

      # --- PUBLISH RELEASE ---
      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "NexLinks_Android.apk,NexLinks_Linux.tar.gz,NexLinks_Web.tar.gz"
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          makeLatest: true
          name: "Release ${{ github.ref_name }}"
          body: "Automated release for version ${{ github.ref_name }}."

  # Windows needs a separate job because it runs on windows-latest
  release-windows:
    name: Build Windows
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get Dependencies
        run: flutter pub get

      - name: Create MSIX Installer
        run: dart run msix:create

      - name: Rename MSIX
        run: Rename-Item -Path build/windows/runner/Release/NexLinks_Installer.msix -NewName NexLinks_Windows.msix

      # separate release step (it appends to the same tag if it exists)
      - name: Upload Windows Asset
        uses: ncipollo/release-action@v1
        with:
          artifacts: "build/windows/runner/Release/NexLinks_Windows.msix"
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          omitBody: true
          omitName: true
          omitPrereleaseDuringUpdate: true

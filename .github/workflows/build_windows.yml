name: Build Windows App

on:
  workflow_dispatch: # Allows you to click a button to start the build manually
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Windows EXE
        run: flutter build windows --release

      - name: Compress Build Output
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath windows_app.zip

      - name: Upload Output
        uses: actions/upload-artifact@v4
        with:
          name: windows-app-release
          path: windows_app.zip

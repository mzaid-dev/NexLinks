name: Build Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get Dependencies
        run: flutter pub get

      - name: Create MSIX Installer
        # FIX: --install-certificate false prevents interactive prompt crash
        run: dart run msix:create --install-certificate false

      - name: Find and Rename MSIX
        run: |
          Get-ChildItem -Path build -Filter *.msix -Recurse | ForEach-Object {
            Write-Host "Found MSIX: $($_.FullName)"
            Move-Item -Path $_.FullName -Destination "NexLinks.msix"
          }

      - name: Verify MSIX Exists
        run: |
          if (-Not (Test-Path "NexLinks.msix")) {
            Write-Error "MSIX file was not found after build!"
            exit 1
          }

      - name: Upload Windows Asset
        uses: ncipollo/release-action@v1
        with:
          artifacts: "NexLinks.msix"
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          tag: ${{ github.ref_type == 'tag' && github.ref_name || 'continuous' }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || 'Continuous Build' }}
          body: ${{ github.ref_type == 'tag' && format('Release {0}', github.ref_name) || 'Automated continuous build from main branch.' }}
          omitBody: true
          omitName: false
          omitPrereleaseDuringUpdate: true

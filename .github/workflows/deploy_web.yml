name: Deploy Flutter Web to Vercel

on:
  push:
    branches: [ main ] # Runs every time you push to main

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Install Flutter
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 2. Get Dependencies
      - name: Get Dependencies
        run: flutter pub get

      # 3. Build the Website
      # This creates the 'build/web' folder and copies vercel configuration
      - name: Build Web App
        run: |
          flutter build web --release
          cp vercel.json build/web/

      # 4. Push to Vercel
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./build/web # ⚠️ Crucial: Only deploy the built files

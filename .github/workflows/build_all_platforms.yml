name: Build All Platforms

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  # -------------------------
  # 1. Android Build (APK & AAB)
  # -------------------------
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK (Release)
        run: flutter build apk --release

      - name: Build App Bundle (Release)
        run: flutter build appbundle --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload Bundle
        uses: actions/upload-artifact@v4
        with:
          name: android-bundle-aab
          path: build/app/outputs/bundle/release/app-release.aab

  # -------------------------
  # 2. iOS Build (IPA)
  # -------------------------
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build IPA (No Codesign)
        # Note: Real App Store distribution requires valid certificates/profiles.
        # We use --no-codesign to ensure the build pipeline passes for testing.
        run: flutter build ipa --release --no-codesign

      - name: Upload IPA Payload
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/archive/Runner.xcarchive

  # -------------------------
  # 3. Windows Build (EXE)
  # -------------------------
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Windows EXE
        run: flutter build windows --release

      - name: Create MSIX Installer
        run: dart run msix:create

      - name: Upload MSIX Installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-msix
          path: build/windows/runner/Release/NexLinks_Installer.msix

  # -------------------------
  # 4. Linux Build (AppImage/Binary)
  # -------------------------
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Linux Binary
        run: flutter build linux --release

      - name: Compress Linux Output
        run: tar -czvf linux_app.tar.gz -C build/linux/x64/release/bundle .

      - name: Upload Linux Tarball
        uses: actions/upload-artifact@v4
        with:
          name: linux-app-release
          path: linux_app.tar.gz

  # -------------------------
  # 5. Web Build (HTML/JS)
  # -------------------------
  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release

      - name: Compress Web Output
        run: tar -czvf web_app.tar.gz -C build/web .

      - name: Upload Web Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-app-release
          path: web_app.tar.gz
